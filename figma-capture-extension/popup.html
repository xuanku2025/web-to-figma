<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web to Figma</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <h1>Web to Figma</h1>
    <label class="row" for="assetProxyToggle">
      <span>跨域图片代理模式</span>
      <input id="assetProxyToggle" type="checkbox" />
    </label>
    <p class="hint">默认关闭。仅当网页图片大量丢失时再开启。</p>
    <button id="captureBtn" type="button">开始采集</button>
    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
