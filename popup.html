<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web to Figma</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <h1>Web to Figma</h1>
    <label class="row" for="assetProxyToggle">
      <span>跨域图片代理模式</span>
      <input id="assetProxyToggle" type="checkbox" />
    </label>
    <label class="row" for="proxyConcurrency">
      <span>图片采集并发</span>
      <select id="proxyConcurrency">
        <option value="4">4</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="16">16</option>
        <option value="20">20</option>
        <option value="infinite">无限</option>
      </select>
    </label>
    <p class="hint">默认关闭代理。并发仅影响开启代理后的图片抓取速度与稳定性。</p>
    <button id="captureBtn" type="button">开始采集</button>
    <p class="shortcut-hint">快捷键：<kbd id="shortcutKey"></kbd> 快速采集</p>
    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
